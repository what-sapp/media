<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad)" opacity="0.1"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#grad)" stroke-width="3"/>
  
  <!-- U letter -->
  <path d="M 55 140 
           L 55 75 
           Q 55 55 75 55 
           Q 100 55 100 75 
           L 100 140"
        fill="none" stroke="url(#grad)" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Second U (mirrored for effect) -->
  <path d="M 145 140 
           L 145 75 
           Q 145 55 125 55 
           Q 100 55 100 75 
           L 100 140"
        fill="none" stroke="url(#grad)" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Crown/star on top -->
  <polygon points="100,30 108,50 130,50 113,63 120,85 100,72 80,85 87,63 70,50 92,50" 
           fill="url(#grad)"/>
  
  <!-- Small text -->
  <text x="100" y="175" text-anchor="middle" fill="url(#grad)" font-size="14" font-weight="bold" font-family="Arial">UTHUMAN</text>
</svg>