<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 180" width="500" height="180">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="180" rx="20" fill="#1a1a2e" />

  <!-- 🌀 Emoji -->
  <text x="75" y="115" text-anchor="middle" font-size="85">
    🌀
  </text>

  <!-- PHANTOM text -->
  <text x="270" y="100" text-anchor="middle" font-family="'Arial Black', 'Segoe UI Black', sans-serif" font-size="52" font-weight="900" fill="url(#gradient)" letter-spacing="6">
    PHANTOM
  </text>

  <!-- Subtitle -->
  <text x="270" y="130" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#888" letter-spacing="8">
    MEDIA DOWNLOADER
  </text>
</svg>