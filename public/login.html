<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PHANTOM - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --secondary: #764ba2;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #0a0a0f;
            --card: #12121a;
            --border: #2a2a3a;
            --text: #ffffff;
            --text-muted: #a0a0b0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, #050508 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .login-container {
            max-width: 450px;
            width: 100%;
        }

        .login-card {
            background: var(--card);
            border-radius: 30px;
            padding: 2.5rem;
            text-align: center;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .logo {
            margin-bottom: 1.5rem;
        }

        .logo img {
            height: 70px;
            width: auto;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 0.5rem;
        }

        .tagline {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 0.75rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            font-size: 0.8rem;
            display: none;
        }

        .google-btn {
            background: white;
            color: #333;
            border: none;
            padding: 1rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            width: 100%;
            transition: all 0.3s;
            margin-bottom: 1.5rem;
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .api-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 1.5rem;
            margin-top: 0.5rem;
        }

        .api-title {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .api-key-input {
            width: 100%;
            padding: 0.85rem;
            background: var(--dark);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-family: monospace;
            font-size: 0.8rem;
            margin-bottom: 0.75rem;
        }

        .api-key-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .dev-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            padding: 0.85rem;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }

        .dev-btn:hover {
            opacity: 0.9;
        }

        .signup-link {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .signup-link a {
            color: var(--primary);
            text-decoration: none;
        }

        .platforms {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .platform-badge {
            font-size: 0.7rem;
            padding: 0.25rem 0.75rem;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 20px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <img src="/uthuman.svg" alt="UTHUMAN" onerror="this.src='https://placehold.co/70x70/667eea/white?text=U'">
                <div class="logo-text">PHANTOM</div>
            </div>
            <div class="tagline">Download any media from any platform</div>

            <div id="errorMsg" class="error"></div>

            <button class="google-btn" onclick="loginWithGoogle()">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </button>

            <div class="divider">OR</div>

            <div class="api-section">
                <div class="api-title">
                    🔑 Developer Access
                </div>
                <input type="text" id="apiKey" class="api-key-input" placeholder="Enter your API key">
                <button class="dev-btn" onclick="loginWithApiKey()">Continue with API Key</button>
                <div class="signup-link">
                    No API key? <a href="/auth/google">Sign in with Google to get one</a>
                </div>
            </div>

            <div class="platforms">
                <span class="platform-badge">📺 YouTube</span>
                <span class="platform-badge">📸 Instagram</span>
                <span class="platform-badge">🎵 TikTok</span>
                <span class="platform-badge">🐦 Twitter</span>
                <span class="platform-badge">📘 Facebook</span>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        async function loginWithGoogle() {
            window.location.href = `${API_BASE}/auth/google`;
        }

        async function loginWithApiKey() {
            const apiKey = document.getElementById('apiKey').value.trim();
            
            if (!apiKey) {
                showError('Please enter your API key');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/api/v1/me`, {
                    headers: { 'Authorization': `Bearer ${apiKey}` }
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    localStorage.setItem('apiKey', apiKey);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/developer';
                } else {
                    showError(data.error || 'Invalid API key');
                }
            } catch (error) {
                showError('Failed to verify API key');
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
